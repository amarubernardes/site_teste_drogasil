<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Drogasil</title>

  <!-- Fonte -->
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">

  <!-- CSS -->
  <link rel="stylesheet" href="figma.css">
</head>
<body>

  <!-- HEADER -->
  <header class="topo">
    <h1>DROGASIL</h1>
    <div class="icons">
      <span>🛒</span>
      <span>🔍</span>
    </div>
  </header>

  <!-- CARD EXTERNO (igual do figma) -->
  <div class="card-outer">

    <!-- CARD INTERNO -->
    <div class="card">

      <!-- IMAGEM ONLINE (não precisa baixar) -->
      <img src="dipirona-removebg-preview.png"
           alt="Dipirona">

      <!-- TEXTO -->
      <div class="info">
        <h2>Dipirona Monoidratada 1g 10 Comprimidos Medley Genérico</h2>

        <p class="desc">10 comprimidos</p>
        <p class="old">1 por R$ 21,44</p>

        <p class="price">
          2 por <span>R$ 7,93</span> cada
        </p>

        <button>Comprar 🛒</button>
      </div>

    </div>
  </div>

</body>
</html>
